<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders - BGB Bakehouse</title>
    <link rel="stylesheet" href="css/admin.css">
    <script>
        // Check admin authentication before showing the page
        fetch('api/check-admin.php')
            .then(res => res.json())
            .then(data => {
                if (!data.is_admin) {
                    window.location.href = 'admin-login.html';
                } else {
                    document.body.style.display = 'flex';
                    if (data.worker_name) {
                        document.getElementById('adminNameLabel').textContent = data.worker_name;
                        document.getElementById('greetingName').textContent = 'Good morning, ' + data.worker_name + '! ♥️';
                    }
                    if (data.worker_profile_image) {
                        document.getElementById('adminProfileImg').src = data.worker_profile_image;
                    }
                    loadDashboardData();
                }
            })
            .catch(() => {
                window.location.href = 'admin-login.html';
            });
    </script>
</head>
<body style="display: none;">

<!-- Sidebar -->
<aside class="admin-sidebar">
    <div class="sidebar-logo">
        <img src="images/IMG_7322-removebg-preview.png" alt="BGB Bakehouse logo" style="filter: brightness(0) invert(1);" />
    </div>
    <nav class="sidebar-nav">
        <a href="admin.html">Dashboard</a>
        <a href="admin-orders.html" class="active">Orders</a>
        <a href="admin.html#customers">Customers</a>
        <a href="admin.html#products">Products</a>
        <a href="admin.html#reports">Reports</a>
        <a href="worker-profile.html">My Profile</a>
    </nav>
    <div style="margin-top: auto; text-align: center; font-size: 12px; color: #999;">
        <img src="images/IMG_7322-removebg-preview.png" alt="Mascot" style="width:80px; filter: brightness(0) invert(1); opacity: 0.5; margin-bottom:10px;"><br>
        Batter goes blop!<br>Thanks for baking with love today!
    </div>
</aside>

<!-- Main Content -->
<main class="admin-main">
    
    <!-- Topbar -->
    <header class="admin-topbar">
        <div class="topbar-left">
            <h1>✨ Dashboard ✨</h1>
            <p id="greetingName">Good morning!</p>
        </div>
        <div class="topbar-right">
            <div class="date-selector" style="padding: 0; background: transparent; border: none; box-shadow: none; display: flex; gap: 5px;">
                <select id="globalFilterType" class="button button-outline" style="background: white; border-radius: 8px; border: 1px solid #ddd; padding: 0 10px;">
                    <option value="all">Overall</option>
                    <option value="daily">Daily</option>
                    <option value="monthly">Monthly</option>
                </select>
                <input type="date" id="globalDateFilter" class="custom-date-picker" style="background: white; display: none;" />
                <select id="globalMonthFilter" class="custom-date-picker" style="background: white; display: none;"></select>
                <button id="clearDateBtn" class="button button-dark" style="padding: 10px 15px; border-radius: 8px;">Clear</button>
            </div>
            <a href="worker-profile.html" class="admin-profile">
                <img id="adminProfileImg" src="images/IMG_7322-removebg-preview.png" alt="Profile" />
                <div class="admin-profile-info">
                    <strong id="adminNameLabel">Admin</strong>
                    <span>Worker</span>
                </div>
            </a>
        </div>
    </header>

    <!-- Content -->
    <div style="margin-top: 20px;">
        <!-- Orders -->
        <div class="panel">
            <div class="panel-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h2>Orders</h2>
                    <input type="text" id="ordersSearchInput" class="custom-date-picker" placeholder="Search Order ID or Cust Name..." style="width: 210px;" />
                </div>
            </div>
            <table class="recent-orders-table">
                <thead>
                    <tr>
                        <th>ORDER ID</th>
                        <th>CUSTOMER</th>
                        <th>TYPE</th>
                        <th>ITEMS</th>
                        <th>STATUS</th>
                        <th>TOTAL</th>
                        <th>TIME</th>
                    </tr>
                </thead>
                <tbody id="recentOrdersBody">
                    <tr><td colspan="7">Loading...</td></tr>
                </tbody>
            </table>
            <div style="display: flex; justify-content: flex-end; align-items: center; padding: 15px 0 0 0; gap: 10px;">
                <button id="prevPageBtn" class="button button-outline" style="padding: 5px 15px;" disabled>Prev</button>
                <span id="pageInfo">Page 1 of 1</span>
                <button id="nextPageBtn" class="button button-outline" style="padding: 5px 15px;" disabled>Next</button>
            </div>
        </div>
    </div>

</main>

<script>
    let currentPage = 1;

    const filterType = document.getElementById('globalFilterType');
    const dateFilter = document.getElementById('globalDateFilter');
    const monthFilter = document.getElementById('globalMonthFilter');

    // Populate month filter
    const monthsArr = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const d = new Date();
    for (let i = 0; i < 12; i++) {
        const m = d.getMonth();
        const y = d.getFullYear();
        const val = y + '-' + (m + 1).toString().padStart(2, '0');
        const text = monthsArr[m] + ' ' + y;
        const opt = document.createElement('option');
        opt.value = val;
        opt.textContent = text;
        monthFilter.appendChild(opt);
        d.setMonth(d.getMonth() - 1);
    }

    filterType.addEventListener('change', () => {
        if (filterType.value === 'all') {
            dateFilter.style.display = 'none';
            monthFilter.style.display = 'none';
            dateFilter.value = '';
            monthFilter.value = '';
        } else if (filterType.value === 'daily') {
            dateFilter.style.display = 'block';
            monthFilter.style.display = 'none';
        } else if (filterType.value === 'monthly') {
            dateFilter.style.display = 'none';
            monthFilter.style.display = 'block';
        }
        currentPage = 1;
        loadDashboardData();
    });

    dateFilter.addEventListener('change', () => { currentPage = 1; loadDashboardData(); });
    monthFilter.addEventListener('change', () => { currentPage = 1; loadDashboardData(); });

    document.getElementById('clearDateBtn').addEventListener('click', function() {
        filterType.value = 'all';
        dateFilter.style.display = 'none';
        monthFilter.style.display = 'none';
        dateFilter.value = '';
        monthFilter.value = '';
        currentPage = 1;
        loadDashboardData();
    });
    
    document.getElementById('ordersSearchInput').addEventListener('keyup', () => { currentPage = 1; loadDashboardData(); });

    document.getElementById('prevPageBtn').addEventListener('click', () => {
        if (currentPage > 1) {
            currentPage--;
            loadDashboardData();
        }
    });

    document.getElementById('nextPageBtn').addEventListener('click', () => {
        currentPage++;
        loadDashboardData();
    });

    function formatCurrency(val) {
        return 'RM' + parseFloat(val).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function setMetric(id, current) {
        document.getElementById('metric-' + id).textContent = (id === 'revenue') ? formatCurrency(current) : current;
    }

    function getStatusClass(status) {
        const s = status.toLowerCase();
        if (s.includes('pending')) return 'status-pending';
        if (s.includes('prepar')) return 'status-preparing';
        if (s.includes('ready')) return 'status-ready';
        if (s.includes('complet')) return 'status-completed';
        if (s.includes('cancel')) return 'status-cancelled';
        return 'status-pending';
    }

    function loadDashboardData() {
        const searchTxt = document.getElementById('ordersSearchInput').value;
        let url = 'api/orders.php?page=' + currentPage;
        
        if (filterType.value === 'daily' && dateFilter.value) {
            url += '&global_date=' + dateFilter.value;
        } else if (filterType.value === 'monthly' && monthFilter.value) {
            url += '&global_month=' + monthFilter.value;
        }
        
        if (searchTxt) url += '&search=' + encodeURIComponent(searchTxt);

        fetch(url)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Update pagination
                    document.getElementById('pageInfo').textContent = 'Page ' + data.current_page + ' of ' + data.total_pages;
                    document.getElementById('prevPageBtn').disabled = data.current_page <= 1;
                    document.getElementById('nextPageBtn').disabled = data.current_page >= data.total_pages;

                    // Orders
                    const tbody = document.getElementById('recentOrdersBody');
                    tbody.innerHTML = '';
                    if (data.orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No orders found</td></tr>';
                    } else {
                        data.orders.forEach(o => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td class="order-id">${o.order_id}</td>
                                <td>${o.customer_name}</td>
                                <td class="order-type">${o.type}</td>
                                <td>${o.items}</td>
                                <td><span class="status-pill ${getStatusClass(o.status)}">${o.status.toUpperCase()}</span></td>
                                <td>${formatCurrency(o.total)}</td>
                                <td>${o.time}</td>
                            `;
                            tbody.appendChild(tr);
                        });
                    }
                }
            });
    }
</script>
</body>
</html>
