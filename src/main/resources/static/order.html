<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order - BGB Bakehouse</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
    <div class="page-shell">
        <header class="subpage-header">
            <nav class="navbar container" aria-label="Primary navigation">
                <a class="brand" href="/">
                    <img class="brand-logo" src="/images/IMG_7322-removebg-preview.png" alt="BGB Bakehouse logo" />
                    <span>Batter Goes Blop!</span>
                </a>
                <div class="nav-links">
                    <a href="/">Home</a>
                    <a href="/menu.html">Menu</a>
                    <a href="/about.html">About Us</a>
                    <a href="/#faq">FAQ</a>
                </div>
                <div class="nav-actions">
                    <a class="cart-pill active" href="/order.html">Cart <span data-cart-count>0</span></a>
                    <a class="button button-dark nav-order" href="/order.html">Order Now</a>
                </div>
            </nav>
            <section class="menu-hero container">
                <p class="paper-tag">Order form</p>
                <h1>Confirm your treats</h1>
                <p>Add your details, choose pickup or delivery, and send the order for confirmation.</p>
            </section>
        </header>

        <main>
            <section class="order-flow container" id="order">
                <div class="order-form-panel">
                    <p class="eyebrow">Customer details</p>
                    <h2>Step 1</h2>
                    <form class="order-form" id="shopOrderForm" data-order-form>
                        <label>Full name <input type="text" name="name" placeholder="Enter your full name" /></label>
                        <label>Phone number <input type="tel" name="phone" placeholder="e.g. 0123456789" /></label>
                        <label>Email address <input type="email" name="email" placeholder="e.g. name@email.com" /></label>
                        <label>
                            Fulfilment
                            <select name="fulfilment">
                                <option>Pickup</option>
                                <option>Delivery</option>
                            </select>
                        </label>
                        <label>Preferred date <input type="date" name="date" /></label>
                        <label>Order notes <textarea name="notes" rows="4" placeholder="Delivery address, pickup time, or special request"></textarea></label>
                    </form>
                </div>

                <aside class="order-summary-panel">
                    <p class="eyebrow">Order list</p>
                    <h2>Your cart</h2>
                    <ul class="cart-list" data-cart-list>
                        <li>No items selected yet.</li>
                    </ul>
                    <button class="button button-dark" type="submit" form="shopOrderForm" data-submit-order>Submit order</button>
                    <a class="button button-light" href="/menu.html">Add more treats</a>
                    <p class="form-message" data-order-message></p>
                </aside>
            </section>
        </main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
