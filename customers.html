<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers - BGB Bakehouse Admin</title>
    <link rel="stylesheet" href="css/styles.css" />

    <script>
        fetch('api/check-admin.php')
            .then(res => res.json())
            .then(data => {
                if (!data.is_admin) {
                    window.location.href = 'admin-login.html';
                } else {
                    document.body.style.display = 'block';
                }
            })
            .catch(() => {
                window.location.href = 'admin-login.html';
            });
    </script>

    <style>
        .admin-panels{
            display:flex;
            flex-direction:column;
            gap:24px;
        }
        /* Summary cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .summary-card {
            background: #fff;
            border: 1px solid #ebebeb;
            border-radius: 10px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .summary-card-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .summary-card-icon.blue   { background: #e8f0fe; color: #1a56db; }
        .summary-card-icon.green  { background: #e3f9e5; color: #1a7431; }
        .summary-card-icon.amber  { background: #fff3e0; color: #b45309; }
        .summary-card-body { display: flex; flex-direction: column; gap: 2px; }
        .summary-card-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #888;
        }
        .summary-card-value {
            font-size: 24px;
            font-weight: 700;
            color: #111;
            line-height: 1.1;
        }
        .summary-card-sub { font-size: 12px; color: #aaa; }

        /* Toolbar */
        .panel-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .search-input {
            padding: 7px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 240px;
        }

        /* Table */
        table { width: 100%; border-collapse: collapse; }
        table th, table td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            font-family: Comic Sans MS, Comic Sans, cursive, sans-serif;
        }
        table thead th {
            background: #f7f7f7;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
        }
        table tbody tr:hover { background: #fafafa; }
        table tbody tr:last-child td { border-bottom: none; }
        .td-actions { display: flex; gap: 6px; }
        .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        .btn-edit   { background: #e8f0fe; color: #1a56db; }
        .btn-delete { background: #fde8e8; color: #c0392b; }
        .btn-edit:hover   { background: #c7d9fb; }
        .btn-delete:hover { background: #fbc8c8; }

        /* Modal */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-backdrop.open { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 10px;
            padding: 28px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 40px rgba(0,0,0,0.18);
        }
        .modal-box h3 { margin: 0 0 20px; font-size: 17px; font-weight: 600; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .modal-grid .full { grid-column: 1 / -1; }
        .field-group { display: flex; flex-direction: column; gap: 4px; }
        .field-group label {
            font-size: 12px; font-weight: 600; color: #555;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .field-group input {
            padding: 8px 10px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px;
        }
        .field-group input:focus { outline: none; border-color: #999; }
        .field-group input:disabled { background: #f5f5f5; color: #999; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button {
            flex: 1; padding: 10px; border-radius: 6px;
            font-size: 14px; font-weight: 500; cursor: pointer; border: none;
        }
        .btn-cancel { background: #f0f0f0; color: #333; }
        .btn-save   { background: #111; color: #fff; }
        .btn-cancel:hover { background: #e0e0e0; }
        .btn-save:hover   { opacity: 0.85; }
    </style>
</head>


<body class="admin-body" style="display:none;">


<div class="admin-layout">

    <!-- Sidebar -->
    <div id="sidebar-container" style="width: 250px; flex-shrink: 0; background-color: #19150f; display: flex; flex-direction: column;"></div>



    <!-- Main -->
    <main class="admin-main">

        <header class="admin-topbar">
            <div>
                <p class="eyebrow">Admin</p>
                <h1>Customers</h1>
            </div>
            <div style="display:flex; gap:10px;">
                <a class="button button-dark" href="index.html">View Site</a>
                <button class="button button-light" id="logoutBtn">Logout</button>
            </div>
        </header>

        <section class="admin-panels">

            <!-- Summary Cards -->
            <div class="summary-cards">

                <div class="summary-card">
                    <div class="summary-card-icon blue">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                    </div>
                    <div class="summary-card-body">
                        <span class="summary-card-label">Total Customers</span>
                        <span class="summary-card-value" id="statTotal">—</span>
                        <span class="summary-card-sub">registered accounts</span>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-card-icon green">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </div>
                    <div class="summary-card-body">
                        <span class="summary-card-label">States Covered</span>
                        <span class="summary-card-value" id="statStates">—</span>
                        <span class="summary-card-sub">active locations</span>
                    </div>
                </div>

                <div class="summary-card">
                    <div class="summary-card-icon amber">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <div class="summary-card-body">
                        <span class="summary-card-label">Latest ID</span>
                        <span class="summary-card-value" id="statLatest">—</span>
                        <span class="summary-card-sub">most recent entry</span>
                    </div>
                </div>

            </div>

            <!-- Customer Table -->
            <article class="admin-panel">

                <div class="panel-toolbar">
                    <div class="panel-heading" style="margin:0;">
                        <h2>Customer List</h2>
                    </div>
                    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                        <input
                            class="search-input"
                            type="text"
                            id="searchInput"
                            placeholder="Search by name, email or ID..."
                            oninput="onSearch()"
                        />
                        <button class="button button-dark" onclick="openAdd()">
                            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="vertical-align:middle; margin-right:4px;">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                            Add Customer
                        </button>
                    </div>
                </div>

                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>State</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="customerTableBody">
                            <tr><td colspan="6">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div id="pagination" style="margin-top:14px; display:flex; align-items:center; justify-content:space-between; font-size:13px; color:#666;"></div>

            </article>

        </section>
    </main>
</div>

<!-- Add Modal -->
<div class="modal-backdrop" id="addModal">
    <div class="modal-box">
        <h3>Add New Customer</h3>
        <div class="modal-grid">
            <div class="field-group"><label>Customer ID</label><input id="add_id" placeholder="e.g. C007" /></div>
            <div class="field-group"><label>Full Name</label><input id="add_name" placeholder="e.g. Ahmad Syafiq" /></div>
            <div class="field-group"><label>Phone</label><input id="add_phone" placeholder="e.g. 012-3456789" /></div>
            <div class="field-group"><label>Email</label><input id="add_email" type="email" placeholder="name@email.com" /></div>
            <div class="field-group"><label>Password</label><input id="add_password" type="password" placeholder="••••••••" /></div>
            <div class="field-group"><label>Postcode</label><input id="add_postcode" placeholder="e.g. 50480" /></div>
            <div class="field-group full"><label>Address 1</label><input id="add_address1" placeholder="Street / unit" /></div>
            <div class="field-group full"><label>Address 2</label><input id="add_address2" placeholder="Area / neighbourhood" /></div>
            <div class="field-group full"><label>State</label><input id="add_state" placeholder="e.g. Kuala Lumpur" /></div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModals()">Cancel</button>
            <button class="btn-save" onclick="submitAdd()">Add Customer</button>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-backdrop" id="editModal">
    <div class="modal-box">
        <h3 id="editModalTitle">Edit Customer</h3>
        <div class="modal-grid">
            <div class="field-group"><label>Customer ID</label><input id="edit_id" disabled /></div>
            <div class="field-group"><label>Full Name</label><input id="edit_name" placeholder="e.g. Ahmad Syafiq" /></div>
            <div class="field-group"><label>Phone</label><input id="edit_phone" placeholder="e.g. 012-3456789" /></div>
            <div class="field-group"><label>Email</label><input id="edit_email" type="email" placeholder="name@email.com" /></div>
            <div class="field-group"><label>Password</label><input id="edit_password" type="password" placeholder="Leave blank to keep current" /></div>
            <div class="field-group"><label>Postcode</label><input id="edit_postcode" placeholder="e.g. 50480" /></div>
            <div class="field-group full"><label>Address 1</label><input id="edit_address1" placeholder="Street / unit" /></div>
            <div class="field-group full"><label>Address 2</label><input id="edit_address2" placeholder="Area / neighbourhood" /></div>
            <div class="field-group full"><label>State</label><input id="edit_state" placeholder="e.g. Kuala Lumpur" /></div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModals()">Cancel</button>
            <button class="btn-save" onclick="submitEdit()">Save Changes</button>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal-backdrop" id="deleteModal">
    <div class="modal-box" style="max-width:380px; text-align:center;">
        <h3>Delete Customer?</h3>
        <p id="deleteModalMsg" style="color:#555; font-size:14px; margin-bottom:20px; line-height:1.5;"></p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModals()">Cancel</button>
            <button style="flex:1; padding:10px; border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; border:none; background:#c0392b; color:#fff;" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<script>
const API = "api/customers.php";
const PAGE_SIZE = 10;

let allCustomers = [];
let filtered     = [];
let currentPage  = 1;
let deleteId     = null;

function loadCustomers() {
    fetch(API + "?action=get")
        .then(res => res.json())
        .then(data => {
            allCustomers = data;
            applyFilter();
            updateStats();
        })
        .catch(() => {
            document.getElementById("customerTableBody").innerHTML =
                '<tr><td colspan="6">Failed to load customers.</td></tr>';
        });
}

function updateStats() {
    document.getElementById("statTotal").textContent = allCustomers.length;
    const states = [...new Set(allCustomers.map(c => c.state).filter(Boolean))];
    document.getElementById("statStates").textContent = states.length;
    const last = allCustomers[allCustomers.length - 1];
    document.getElementById("statLatest").textContent = last ? last.id : "—";
}

function onSearch() { currentPage = 1; applyFilter(); }

function applyFilter() {
    const q = document.getElementById("searchInput").value.toLowerCase().trim();
    filtered = q
        ? allCustomers.filter(c =>
            c.id.toLowerCase().includes(q) ||
            c.name.toLowerCase().includes(q) ||
            (c.email || "").toLowerCase().includes(q) ||
            (c.phoneNumber || c.phone || "").includes(q))
        : [...allCustomers];
    renderTable();
    renderPagination();
}

function renderTable() {
    const tbody = document.getElementById("customerTableBody");
    const slice = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
    if (!slice.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:30px; color:#999;">No customers found.</td></tr>';
        return;
    }
    tbody.innerHTML = slice.map(c => {
        const phone = c.phoneNumber || c.phone || "—";
        return '<tr>' +
            '<td>' + esc(c.id) + '</td>' +
            '<td>' + esc(c.name) + '</td>' +
            '<td>' + esc(phone) + '</td>' +
            '<td>' + esc(c.email || "—") + '</td>' +
            '<td>' + esc(c.state || "—") + '</td>' +
            '<td><div class="td-actions">' +
                '<button class="btn-sm btn-edit" onclick="openEdit(\'' + esc(c.id) + '\')">' +
                    '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
                    ' Edit' +
                '</button>' +
                '<button class="btn-sm btn-delete" onclick="openDelete(\'' + esc(c.id) + '\',\'' + esc(c.name) + '\')">' +
                    '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>' +
                    ' Delete' +
                '</button>' +
            '</div></td>' +
        '</tr>';
    }).join("");
}

function renderPagination() {
    const total = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    const el    = document.getElementById("pagination");
    if (total <= 1 && filtered.length <= PAGE_SIZE) { el.innerHTML = ""; return; }
    const start = (currentPage - 1) * PAGE_SIZE + 1;
    const end   = Math.min(currentPage * PAGE_SIZE, filtered.length);
    let btns = '<button class="btn-sm" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + ' style="background:#eee;">&larr;</button> ';
    for (let i = 1; i <= total; i++) {
        btns += '<button class="btn-sm" onclick="goPage(' + i + ')" style="background:' + (i === currentPage ? '#111' : '#eee') + '; color:' + (i === currentPage ? '#fff' : '#333') + '; margin:0 2px;">' + i + '</button>';
    }
    btns += ' <button class="btn-sm" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage === total ? 'disabled' : '') + ' style="background:#eee;">&rarr;</button>';
    el.innerHTML = '<span>Showing ' + start + '–' + end + ' of ' + filtered.length + '</span><div>' + btns + '</div>';
}

function goPage(n) {
    const total = Math.ceil(filtered.length / PAGE_SIZE);
    currentPage = Math.max(1, Math.min(n, total));
    renderTable();
    renderPagination();
}

function esc(s) {
    return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function closeModals() {
    document.getElementById("addModal").classList.remove("open");
    document.getElementById("editModal").classList.remove("open");
    document.getElementById("deleteModal").classList.remove("open");
    deleteId = null;
}

document.querySelectorAll(".modal-backdrop").forEach(function(el) {
    el.addEventListener("click", function(e) { if (e.target === el) closeModals(); });
});
document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeModals(); });

function openAdd() {
    ["id","name","phone","email","password","address1","address2","postcode","state"]
        .forEach(function(f) { document.getElementById("add_" + f).value = ""; });
    document.getElementById("addModal").classList.add("open");
    document.getElementById("add_id").focus();
}

function submitAdd() {
    var data = {
        id:       document.getElementById("add_id").value.trim(),
        name:     document.getElementById("add_name").value.trim(),
        phone:    document.getElementById("add_phone").value.trim(),
        email:    document.getElementById("add_email").value.trim(),
        password: document.getElementById("add_password").value,
        address1: document.getElementById("add_address1").value.trim(),
        address2: document.getElementById("add_address2").value.trim(),
        postcode: document.getElementById("add_postcode").value.trim(),
        state:    document.getElementById("add_state").value.trim()
    };
    if (!data.id || !data.name || !data.email) {
        alert("Customer ID, name and email are required.");
        return;
    }
    fetch(API + "?action=add", { method: "POST", body: JSON.stringify(data) })
        .then(function(res) { return res.json(); })
        .then(function() { closeModals(); loadCustomers(); })
        .catch(function() { alert("Failed to add customer."); });
}

function openEdit(id) {
    var c = allCustomers.find(function(x) { return x.id === id; });
    if (!c) return;
    document.getElementById("editModalTitle").textContent = "Edit: " + c.name;
    document.getElementById("edit_id").value       = c.id;
    document.getElementById("edit_name").value     = c.name;
    document.getElementById("edit_phone").value    = c.phoneNumber || c.phone || "";
    document.getElementById("edit_email").value    = c.email || "";
    document.getElementById("edit_password").value = "";
    document.getElementById("edit_address1").value = c.address1 || "";
    document.getElementById("edit_address2").value = c.address2 || "";
    document.getElementById("edit_postcode").value = c.postcode || "";
    document.getElementById("edit_state").value    = c.state || "";
    document.getElementById("editModal").classList.add("open");
    document.getElementById("edit_name").focus();
}

function submitEdit() {
    var data = {
        id:       document.getElementById("edit_id").value,
        name:     document.getElementById("edit_name").value.trim(),
        phone:    document.getElementById("edit_phone").value.trim(),
        email:    document.getElementById("edit_email").value.trim(),
        password: document.getElementById("edit_password").value,
        address1: document.getElementById("edit_address1").value.trim(),
        address2: document.getElementById("edit_address2").value.trim(),
        postcode: document.getElementById("edit_postcode").value.trim(),
        state:    document.getElementById("edit_state").value.trim()
    };
    if (!data.name || !data.email) {
        alert("Name and email are required.");
        return;
    }
    fetch(API + "?action=update", { method: "POST", body: JSON.stringify(data) })
        .then(function(res) { return res.json(); })
        .then(function() { closeModals(); loadCustomers(); })
        .catch(function() { alert("Failed to update customer."); });
}

function openDelete(id, name) {
    deleteId = id;
    document.getElementById("deleteModalMsg").textContent = 'Remove "' + name + '"? This cannot be undone.';
    document.getElementById("deleteModal").classList.add("open");
}

function confirmDelete() {
    if (!deleteId) return;
    fetch(API + "?action=delete", { method: "POST", body: JSON.stringify({ id: deleteId }) })
        .then(function(res) { return res.json(); })
        .then(function() { closeModals(); loadCustomers(); })
        .catch(function() { alert("Failed to delete customer."); });
}

document.getElementById("logoutBtn").addEventListener("click", function() {
    fetch("api/admin-logout.php")
        .then(function() { window.location.href = "admin-login.html"; });
});

loadCustomers();
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const sidebarContainer = document.getElementById('sidebar-container');
        if (sidebarContainer) {
            fetch('admin-sidebar.html')
                .then(res => res.text())
                .then(html => {
                    sidebarContainer.innerHTML = html;
                    
                    // Set active class
                    const currentPath = window.location.pathname.split('/').pop() || 'admin.html';
                    const hash = window.location.hash.substring(1);
                    
                    const navLinks = document.querySelectorAll('.sidebar-nav a');
                    navLinks.forEach(link => {
                        const page = link.getAttribute('data-page');
                        if (hash && page === hash) {
                            link.classList.add('active');
                        } else if (!hash && page === currentPath) {
                            link.classList.add('active');
                        } else {
                            link.classList.remove('active');
                        }
                    });

                    // Logout logic
                    const logoutBtn = document.getElementById('adminLogoutBtn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            fetch('api/admin-logout.php')
                                .then(res => res.json())
                                .then(data => {
                                    if (data.success) {
                                        window.location.href = 'admin-login.html';
                                    }
                                });
                        });
                    }
                });
        }
    });
</script>

</body>
</html>
