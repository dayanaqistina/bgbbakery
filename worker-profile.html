<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Profile - BGB Bakehouse</title>
    <link rel="stylesheet" href="css/admin.css" />
    <style>
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.02);
            max-width: 600px;
            margin: 40px auto;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top: 5px solid #f7c900;
            position: relative;
            overflow: hidden;
        }
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 150px;
            background: linear-gradient(180deg, rgba(247, 201, 0, 0.08) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
            z-index: 0;
        }
        .profile-form {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .profile-form label {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            font-weight: 700;
            font-size: 13px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .profile-form input {
            padding: 14px 16px;
            border: 2px solid #eaeaea;
            border-radius: 12px;
            margin-top: 8px;
            font-family: inherit;
            background: #fafafa;
            transition: all 0.3s ease;
            font-size: 15px;
            color: #333;
        }
        .profile-form input:focus {
            border-color: #f7c900;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(247, 201, 0, 0.15);
        }
        .image-preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }
        .image-preview-container img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 24px rgba(247, 201, 0, 0.2);
            margin-bottom: 16px;
            transition: transform 0.3s ease;
            background: #fff;
        }
        .image-preview-container img:hover {
            transform: scale(1.05) rotate(-3deg);
        }
        .change-pic-btn {
            background: #fff;
            border: 2px solid #f7c900;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            color: #19150f;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .change-pic-btn:hover {
            background: #f7c900;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(247, 201, 0, 0.2);
        }
        .status-message {
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            display: none;
        }
        .status-message.success { 
            color: #1e4620; 
            background: #e7f3e8;
            display: block;
        }
        .status-message.error { 
            color: #721c24; 
            background: #f8d7da;
            display: block;
        }
        .password-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-container input {
            width: 100%;
            padding-right: 65px;
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #888;
            margin-top: 8px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            user-select: none;
            transition: color 0.2s;
            background: #fafafa;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .profile-form input:focus + .password-toggle {
            background: #fff;
        }
        .password-toggle:hover {
            color: #f18a00;
        }
        .save-btn {
            background: linear-gradient(135deg, #f7c900 0%, #f18a00 100%);
            color: #19150f;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(247, 201, 0, 0.25);
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(247, 201, 0, 0.35);
            background: linear-gradient(135deg, #ffe88c 0%, #f7c900 100%);
        }
        .back-dashboard-btn {
            background: transparent;
            color: #19150f;
            border: 2px solid rgba(25, 21, 15, 0.1);
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-dashboard-btn:hover {
            background: rgba(25, 21, 15, 0.03);
            border-color: rgba(25, 21, 15, 0.2);
            transform: translateY(-1px);
        }
    </style>
    <script>
        fetch('api/check-admin.php')
            .then(res => res.json())
            .then(data => {
                if (!data.is_admin) {
                    window.location.href = 'admin-login.html';
                } else {
                    document.body.style.display = 'flex';
                    if (data.worker_name) {
                        document.getElementById('sidebarAdminName').textContent = data.worker_name;
                    }
                }
            })
            .catch(() => {
                window.location.href = 'admin-login.html';
            });
    </script>
</head>
<body class="admin-body" style="display: none;">
    <div id="sidebar-container" style="width: 250px; flex-shrink: 0; background-color: #19150f; display: flex; flex-direction: column;"></div>

    <main class="admin-main">
        <section class="profile-card">
            <div style="text-align: center; margin-bottom: 30px; position: relative; z-index: 2;">
                <h1 style="margin: 0; font-size: 32px; color: #19150f; font-weight: 900; letter-spacing: -0.5px;">Edit Profile</h1>
                <p id="sidebarAdminName" style="margin: 8px 0 0; color: #f18a00; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;">Admin</p>
            </div>

            <form id="workerProfileForm" class="profile-form">
                <div class="image-preview-container full-width">
                    <img id="profileImagePreview" src="images/IMG_7322-removebg-preview.png" alt="Profile Image Preview" />
                    <label for="profileImageInput" class="change-pic-btn">
                        Change Picture
                        <input type="file" id="profileImageInput" name="profile_image" accept="image/png, image/jpeg, image/gif, image/webp" style="display: none;" />
                    </label>
                </div>
                
                <label>Full Name
                    <input type="text" name="WORKER_NAME" id="WORKER_NAME" required />
                </label>

                <label>Email Address
                    <input type="email" name="WORKER_EMAIL" id="WORKER_EMAIL" required />
                </label>

                <label class="full-width">Phone Number
                    <input type="tel" name="WORKER_NOPHONE" id="WORKER_NOPHONE" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
                </label>
                
                <label>New Password (Optional)
                    <div class="password-container">
                        <input type="password" name="WORKER_PASSWORD" id="WORKER_PASSWORD" placeholder="Enter new password" />
                        <span class="password-toggle" onclick="togglePassword('WORKER_PASSWORD', this)">Show</span>
                    </div>
                </label>

                <label>Confirm New Password
                    <div class="password-container">
                        <input type="password" id="CONFIRM_PASSWORD" placeholder="Confirm new password" />
                        <span class="password-toggle" onclick="togglePassword('CONFIRM_PASSWORD', this)">Show</span>
                    </div>
                </label>

                <button type="submit" class="save-btn full-width">Save Changes</button>
                <div id="statusMessage" class="status-message full-width"></div>
            </form>
            
            <div style="margin-top: 20px;">
                <a class="back-dashboard-btn" href="admin.html">Back to Dashboard</a>
            </div>
        </section>
    </main>
<script>
    function togglePassword(inputId, icon) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.textContent = 'Hide';
        } else {
            input.type = 'password';
            icon.textContent = 'Show';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const profileImagePreview = document.getElementById('profileImagePreview');
        const profileImageInput = document.getElementById('profileImageInput');
        const statusMessage = document.getElementById('statusMessage');

        // Load existing profile details
        fetch('api/worker_profile_details.php')
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('WORKER_NAME').value = data.worker.name;
                    document.getElementById('WORKER_EMAIL').value = data.worker.email;
                    document.getElementById('WORKER_NOPHONE').value = data.worker.phone;
                    if (data.worker.profile_image) {
                        profileImagePreview.src = data.worker.profile_image;
                    }
                } else {
                    statusMessage.textContent = 'Failed to load profile data.';
                    statusMessage.className = 'status-message error';
                }
            })
            .catch(() => {
                statusMessage.textContent = 'Error fetching profile data.';
                statusMessage.className = 'status-message error';
            });

        // Image preview logic
        profileImageInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileImagePreview.src = e.target.result;
                }
                reader.readAsDataURL(this.files[0]);
            }
        });

        // Form submission
        document.getElementById('workerProfileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('WORKER_PASSWORD').value;
            const confirmPassword = document.getElementById('CONFIRM_PASSWORD').value;
            
            if (password !== confirmPassword) {
                statusMessage.textContent = 'Passwords do not match.';
                statusMessage.className = 'status-message error';
                return;
            }

            const formData = new FormData(this);

            statusMessage.textContent = 'Saving...';
            statusMessage.className = 'status-message';

            fetch('api/update_worker_profile.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json().then(data => ({status: res.status, body: data})))
            .then(res => {
                if (res.status === 200 && res.body.success) {
                    statusMessage.textContent = 'Profile updated successfully!';
                    statusMessage.className = 'status-message success';
                } else {
                    statusMessage.textContent = res.body.error || 'Failed to update profile.';
                    statusMessage.className = 'status-message error';
                }
            })
            .catch(err => {
                statusMessage.textContent = 'An error occurred while saving.';
                statusMessage.className = 'status-message error';
            });
        });
    });
</script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const sidebarContainer = document.getElementById('sidebar-container');
        if (sidebarContainer) {
            fetch('admin-sidebar.html')
                .then(res => res.text())
                .then(html => {
                    sidebarContainer.innerHTML = html;
                    
                    // Set active class
                    const currentPath = window.location.pathname.split('/').pop() || 'admin.html';
                    const hash = window.location.hash.substring(1);
                    
                    const navLinks = document.querySelectorAll('.sidebar-nav a');
                    navLinks.forEach(link => {
                        const page = link.getAttribute('data-page');
                        const href = link.getAttribute('href');
                        if (hash && (page === hash || href.includes('#' + hash))) {
                            link.classList.add('active');
                        } else if (!hash && (page === currentPath || href === currentPath || (page && page.replace('.html','') === currentPath.replace('.html','')))) {
                            link.classList.add('active');
                        } else {
                            link.classList.remove('active');
                        }
                    });

                    // Logout logic
                    const logoutBtn = document.getElementById('adminLogoutBtn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            fetch('api/admin-logout.php')
                                .then(res => res.json())
                                .then(data => {
                                    if (data.success) {
                                        window.location.href = 'admin-login.html';
                                    }
                                });
                        });
                    }
                });
        }
    });
</script>

</body>
</html>
