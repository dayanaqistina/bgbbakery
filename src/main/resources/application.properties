spring.application.name=bgbbakery

# Local development datasource (H2) - this allows the app to start without Oracle
spring.datasource.url=jdbc:h2:mem:bgbdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Local login credentials for development
spring.security.user.name=bgbuser
spring.security.user.password=bgbpassword

